<!DOCTYPE html>
<html lang="ja" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CL.DM - Interior Estimation Tool</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        main: '#2C3E50',
                        accent: '#E74C3C',
                        bgLight: '#ECF0F1',
                        bgDark: '#1a252f',
                    }
                }
            }
        }
    </script>

    <style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeInUp 0.6s ease-out forwards; }
        
        #hero-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; opacity: 0.2;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .tab-btn { position: relative; transition: all 0.3s ease; }
        .tab-btn.active { color: #E74C3C; }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -2px; left: 0; width: 100%; height: 2px;
            background: #E74C3C;
        }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>

    <!-- Application Structure Plan:
         - 内装業のワークフローに合わせ「計算 -> 見積作成 -> 履歴管理」を一つの画面で完結させる。
         - 単価設定（Master Data）をユーザーが編集可能にし、柔軟性を確保。
         - モバイルでも見積内容が確認しやすいよう、テーブルとカード形式を併用したレスポンシブ設計。
    -->
    <!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->
</head>
<body class="bg-bgLight text-main dark:bg-bgDark dark:text-bgLight transition-colors duration-300">

    <!-- Header -->
    <nav class="fixed w-full z-50 bg-bgLight/90 dark:bg-bgDark/90 backdrop-blur-sm border-b border-gray-200 dark:border-gray-700">
        <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
            <div class="font-bold text-2xl tracking-tighter">CL<span class="text-accent">.</span>DM</div>
            <div class="flex items-center gap-4">
                <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700">
                    <span id="theme-icon">☀</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="relative h-[40vh] min-h-[300px] flex items-center justify-center overflow-hidden pt-16">
        <canvas id="hero-canvas"></canvas>
        <div class="relative z-10 text-center px-4">
            <h1 class="text-4xl md:text-5xl font-extrabold mb-4 animate-fade-in">Estimate <span class="text-accent">Logic</span>.</h1>
            <p class="text-gray-500 dark:text-gray-400 animate-fade-in" style="animation-delay: 0.2s;">
                平米数から即座にプロフェッショナルな見積書を作成。
            </p>
        </div>
    </section>

    <!-- Main Tool Container -->
    <main class="max-w-7xl mx-auto px-4 pb-20 -mt-10 relative z-20">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Left Panel: Calculator & Inputs -->
            <div class="lg:col-span-5 space-y-6">
                <div class="bg-white dark:bg-gray-800 p-6 rounded-3xl shadow-xl border border-gray-100 dark:border-gray-700">
                    
                    <!-- Tabs -->
                    <div class="flex gap-6 mb-8 border-b border-gray-100 dark:border-gray-700">
                        <button onclick="app.setMode('calc')" id="tab-calc" class="tab-btn active pb-2 font-bold text-sm">基本計算</button>
                        <button onclick="app.setMode('estimate')" id="tab-estimate" class="tab-btn pb-2 font-bold text-sm text-gray-400">見積作成</button>
                    </div>

                    <!-- Mode: Basic Calculator -->
                    <div id="panel-calc" class="space-y-6">
                        <div class="bg-gray-50 dark:bg-gray-900/50 p-4 rounded-2xl">
                            <label class="block text-[10px] uppercase tracking-widest text-gray-400 mb-1">現在の平米数 (㎡)</label>
                            <div class="flex items-baseline gap-2">
                                <span id="display-value" class="text-4xl font-mono font-bold text-main dark:text-white">0</span>
                                <span class="text-gray-400 font-bold">㎡</span>
                            </div>
                        </div>
                        
                        <!-- Simple Pad -->
                        <div class="grid grid-cols-4 gap-2">
                            <button onclick="app.append('7')" class="p-4 bg-gray-100 dark:bg-gray-700 rounded-xl font-bold hover:bg-gray
